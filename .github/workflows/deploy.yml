name: Deploy

on:
  workflow_run:
    workflows: ['Test']
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      FRONTEND_FQDN: ${{ secrets.FRONTEND_FQDN }}
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ secrets.HOSTED_ZONE_NAME }}
      FRONTEND_CERTIFICATE_ARN: ${{ secrets.FRONTEND_CERTIFICATE_ARN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify checked out commit
        run: test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - run: npm ci

      - run: npm run build

      - run: npm run deploy:backend

      - run: npm run deploy:frontend

      - run: npm run deploy:assets
