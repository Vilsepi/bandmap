<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandmap</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="api-key-gate" class="api-key-gate">
    <form id="api-key-form" class="api-key-card">
      <h1>Music search</h1>
      <p>Enter your API key to continue</p>
      <input type="password" id="api-key-input" placeholder="API key" autocomplete="off" required />
      <button type="submit" class="btn-primary">Continue</button>
    </form>
  </div>

  <div id="app-shell" class="hidden">
    <div id="app">
      <main id="content">

        <header id="app-topbar">
          <h1>Bandmap</h1>
          <div id="topbar-menu-container">
            <button
              id="topbar-menu-toggle"
              class="topbar-menu-toggle"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
              aria-controls="topbar-menu-dropdown"
              aria-label="Open menu"
            >
              <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div id="topbar-menu-dropdown" class="topbar-menu-dropdown hidden" role="presentation">
              <div class="topbar-menu-panel" role="menu" aria-label="Top bar menu">
                <h2 class="menu-panel-title">Settings</h2>
                <span id="build-info-text" class="menu-build-info" role="note">Loading build info...</span>
                <button id="logout-button" class="menu-action-link" type="button" role="menuitem">Logout</button>
              </div>
            </div>
          </div>
        </header>

        <div id="api-url-warning" class="warning-banner hidden">
          <strong>Backend API endpoint not configured.</strong> Set the <code>VITE_API_BASE_URL</code> environment variable and restart the server.
        </div>

        <!-- Search view -->
        <div id="view-search" class="view active">
          <div class="search-box">
            <input type="text" id="search" placeholder="Search for an artist..." autocomplete="off" />
          </div>
          <div id="search-results" class="card-list"></div>
          <div id="artist-detail" class="hidden">
            <div id="detail-content"></div>
          </div>
        </div>

        <!-- Recommendations view -->
        <div id="view-recommendations" class="view">
          <div id="recommendations-list" class="card-list">
            <p class="empty-state">Loading...</p>
          </div>
          <button id="refresh-recommendations" class="btn-primary">Refresh</button>
        </div>

        <!-- Bookmark view -->
        <div id="view-todo" class="view">
          <div id="todo-list" class="card-list">
            <p class="empty-state">Loading...</p>
          </div>
        </div>

        <!-- Ratings view -->
        <div id="view-ratings" class="view">
          <div id="ratings-list" class="card-list">
            <p class="empty-state">Loading...</p>
          </div>
        </div>

      </main>

      <!-- Main navigation -->
      <nav id="toolbar" aria-label="Main tools">
        <a href="#/" data-view="search" class="nav-link active" aria-label="Search">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <span>Search</span>
        </a>
        <a href="#/recommendations" data-view="recommendations" class="nav-link" aria-label="Recommendations">
          <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
          <span>Recommend</span>
        </a>
        <a href="#/todo" data-view="todo" class="nav-link" aria-label="Todo list">
          <i class="fa-regular fa-bookmark" aria-hidden="true"></i>
          <span>Todo</span>
        </a>
        <a href="#/ratings" data-view="ratings" class="nav-link" aria-label="Rated artists">
          <i class="fa-regular fa-star" aria-hidden="true"></i>
          <span>History</span>
        </a>
      </nav>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
