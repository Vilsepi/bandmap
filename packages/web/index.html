<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandmap — Artist Similarity Graph</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="controls">
      <h1>Bandmap</h1>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search artist..." autocomplete="off" />
        <ul id="search-results"></ul>
      </div>
      <div class="filters">
        <label>
          <span>Filter by tag:</span>
          <select id="tag-filter">
            <option value="">All tags</option>
          </select>
        </label>
        <label>
          <span>Min similarity:</span>
          <input type="range" id="min-weight" min="0" max="1" step="0.05" value="0" />
          <span id="min-weight-value">0</span>
        </label>
      </div>
      <div id="stats"></div>
    </div>
    <div id="graph-container"></div>
    <div id="detail-panel" class="hidden">
      <button id="close-panel">&times;</button>
      <h2 id="detail-name"></h2>
      <div id="detail-tags"></div>
      <a id="detail-url" href="#" target="_blank" rel="noopener">View on Last.fm</a>
      <h3>Similar artists</h3>
      <ul id="detail-similar"></ul>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
