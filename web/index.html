<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandmap — Metal Archives Graph Explorer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="control-panel">
    <div id="search-row">
      <input type="text" id="search-input" placeholder="Search band…" autocomplete="off">
      <button id="random-btn" title="Pick a random band"><i class="fa-solid fa-shuffle"></i></button>
      <ul id="search-results"></ul>
    </div>
    <div id="info-panel">
      <h1 id="band-name">Loading…</h1>
      <p id="band-genres"></p>
      <p id="band-country"></p>
    </div>
    <div id="external-links" aria-label="External links">
      <a id="spotify-link" href="#" target="_blank" rel="noopener" title="Search in Spotify" aria-label="Search in Spotify">Spotify</a>
      <a id="band-link" href="#" target="_blank" rel="noopener" title="Open in Metal Archives" aria-label="Open in Metal Archives">Metal Archives</a>
    </div>
  </div>
  <div id="tooltip"></div>
  <svg id="graph"></svg>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
