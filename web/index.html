<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandmap — Metal Archives Graph Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="info-panel">
    <h1 id="band-name">Loading…</h1>
    <p id="band-country"></p>
    <p id="band-genres"></p>
    <p id="band-neighbors"></p>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search band…" autocomplete="off">
    <ul id="search-results"></ul>
  </div>
  <div id="tooltip"></div>
  <svg id="graph"></svg>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
