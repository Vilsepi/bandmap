<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandmap — Metal Archives Graph Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="control-panel">
    <div id="search-row">
      <input type="text" id="search-input" placeholder="Search band…" autocomplete="off">
      <button id="random-btn" title="Random band">🔀</button>
      <ul id="search-results"></ul>
    </div>
    <div id="info-panel">
      <h1 id="band-name"><a id="band-link" href="#" target="_blank" rel="noopener">Loading…</a></h1>
      <p id="band-genres"></p>
      <p id="band-country"></p>
    </div>
  </div>
  <div id="tooltip"></div>
  <svg id="graph"></svg>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
